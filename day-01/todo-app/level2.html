<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #e0e0e0;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 3rem 1rem;
        }
        .container { width: 100%; max-width: 500px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; font-weight: 300; }
        .input-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        input {
            flex: 1; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333;
            border-radius: 6px; color: #fff; font-size: 1rem; outline: none;
        }
        input:focus { border-color: #555; }
        button {
            padding: 0.75rem 1.25rem; background: #fff; color: #000; border: none;
            border-radius: 6px; font-weight: 600; cursor: pointer;
        }
        button:hover { background: #ddd; }
        ul { list-style: none; }
        li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem; border-bottom: 1px solid #1a1a1a;
        }
        li:hover { background: #1a1a1a; border-radius: 6px; }
        .delete { color: #555; cursor: pointer; font-size: 1.2rem; }
        .delete:hover { color: #ff4444; }
        .empty { color: #444; text-align: center; padding: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do</h1>
        <div class="input-row">
            <input type="text" id="task" placeholder="What needs to be done?">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="list">
            <li class="empty" id="empty-state">No tasks yet.</li>
        </ul>
    </div>
    <script>
        const input = document.getElementById('task');
        const list = document.getElementById('list');
        input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

        function addTask() {
            if (!input.value.trim()) return;
            const empty = document.getElementById('empty-state');
            if (empty) empty.remove();
            const li = document.createElement('li');
            li.innerHTML = `<span>${input.value.trim()}</span><span class="delete" onclick="this.parentElement.remove(); checkEmpty()">×</span>`;
            list.appendChild(li);
            input.value = '';
            input.focus();
        }
        function checkEmpty() {
            if (list.children.length === 0) {
                const li = document.createElement('li');
                li.className = 'empty'; li.id = 'empty-state';
                li.textContent = 'No tasks yet.';
                list.appendChild(li);
            }
        }
    </script>
</body>
</html>
