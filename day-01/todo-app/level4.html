<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 3rem 1rem;
            min-height: 100vh;
        }

        .app { width: 100%; max-width: 520px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.25rem;
        }

        h1 { font-size: 1.6rem; font-weight: 300; color: #fff; letter-spacing: -0.02em; }
        .counter { color: #444; font-size: 0.8rem; }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.25rem;
        }

        .clear-btn {
            background: none; border: none; color: #333; font-size: 0.8rem;
            cursor: pointer; padding: 0.25rem 0; transition: color 0.2s;
        }
        .clear-btn:hover { color: #888; }
        .clear-btn:disabled { cursor: default; color: #1a1a1a; }

        .input-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.85rem 1rem;
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #333; }
        input[type="text"]::placeholder { color: #333; }

        .add-btn {
            padding: 0.85rem 1.5rem;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            min-width: 70px;
        }
        .add-btn:hover { background: #e0e0e0; }
        .add-btn:active { transform: scale(0.97); }

        ul { list-style: none; }

        li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.9rem 0.5rem;
            border-bottom: 1px solid #111;
            cursor: grab;
            transition: background 0.15s, opacity 0.3s, transform 0.3s;
            user-select: none;
            -webkit-user-select: none;
        }
        li:active { cursor: grabbing; }
        li:hover { background: #111; border-radius: 10px; }
        li.dragging { opacity: 0.4; transform: scale(0.98); }
        li.drag-over { border-top: 2px solid #333; }

        li.adding {
            animation: slideIn 0.25s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        li.removing {
            animation: slideOut 0.2s ease-in forwards;
        }
        @keyframes slideOut {
            to { opacity: 0; transform: translateX(30px); height: 0; padding: 0; overflow: hidden; }
        }

        .check {
            width: 22px; height: 22px;
            border: 2px solid #2a2a2a;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-width: 22px;
        }
        .check:hover { border-color: #555; }
        .check.done {
            background: #fff;
            border-color: #fff;
        }
        .check.done::after {
            content: '✓';
            color: #000;
            font-size: 0.65rem;
            font-weight: 800;
        }

        .text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.4;
            transition: all 0.2s;
            word-break: break-word;
        }
        .text.done {
            text-decoration: line-through;
            color: #333;
        }

        .del {
            color: #222;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 0.25rem 0.5rem;
            opacity: 0;
            transition: all 0.15s;
            border-radius: 6px;
        }
        li:hover .del { opacity: 1; }
        .del:hover { color: #ff4444; background: #1a0000; }

        .empty {
            color: #222;
            text-align: center;
            padding: 3rem 1rem;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            body { padding: 2rem 0.75rem; }
            .add-btn { padding: 0.85rem 1rem; }
            li { padding: 1rem 0.5rem; }
            .del { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>To-Do</h1>
            <span class="counter" id="counter"></span>
        </div>
        <div class="actions">
            <button class="clear-btn" id="clear-done" onclick="clearCompleted()">Clear completed</button>
        </div>
        <div class="input-row">
            <input type="text" id="input" placeholder="What needs to be done?" autofocus>
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>
        <ul id="list"></ul>
    </div>

    <script>
        const input = document.getElementById('input');
        const list = document.getElementById('list');
        let tasks = JSON.parse(localStorage.getItem('todos') || '[]');
        let dragIdx = null;

        // Keyboard shortcuts
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
            if (e.key === 'Escape') { input.value = ''; input.blur(); }
        });

        function save() {
            localStorage.setItem('todos', JSON.stringify(tasks));
            updateCounter();
        }

        function updateCounter() {
            const done = tasks.filter(t => t.done).length;
            const counter = document.getElementById('counter');
            const clearBtn = document.getElementById('clear-done');
            counter.textContent = tasks.length ? `${done} of ${tasks.length} completed` : '';
            clearBtn.disabled = done === 0;
        }

        function render(animateLastAdded) {
            list.innerHTML = '';
            if (tasks.length === 0) {
                list.innerHTML = '<li class="empty">No tasks yet.</li>';
                updateCounter();
                return;
            }
            tasks.forEach((task, i) => {
                const li = document.createElement('li');
                li.draggable = true;
                li.dataset.index = i;
                if (animateLastAdded && i === tasks.length - 1) li.classList.add('adding');

                li.innerHTML = `
                    <div class="check ${task.done ? 'done' : ''}" onclick="toggle(${i})"></div>
                    <span class="text ${task.done ? 'done' : ''}">${esc(task.text)}</span>
                    <span class="del" onclick="remove(${i})">×</span>
                `;

                // Drag events
                li.addEventListener('dragstart', () => { dragIdx = i; li.classList.add('dragging'); });
                li.addEventListener('dragend', () => { dragIdx = null; li.classList.remove('dragging'); clearDragStyles(); });
                li.addEventListener('dragover', e => { e.preventDefault(); li.classList.add('drag-over'); });
                li.addEventListener('dragleave', () => { li.classList.remove('drag-over'); });
                li.addEventListener('drop', e => {
                    e.preventDefault();
                    li.classList.remove('drag-over');
                    if (dragIdx !== null && dragIdx !== i) {
                        const moved = tasks.splice(dragIdx, 1)[0];
                        tasks.splice(i, 0, moved);
                        save();
                        render(false);
                    }
                });

                // Touch drag support
                let touchStartY = 0;
                li.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; dragIdx = i; }, { passive: true });
                li.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
                li.addEventListener('touchend', e => {
                    const touchEndY = e.changedTouches[0].clientY;
                    const diff = Math.round((touchEndY - touchStartY) / 60);
                    if (diff !== 0 && dragIdx !== null) {
                        const newIdx = Math.max(0, Math.min(tasks.length - 1, dragIdx + diff));
                        if (newIdx !== dragIdx) {
                            const moved = tasks.splice(dragIdx, 1)[0];
                            tasks.splice(newIdx, 0, moved);
                            save();
                            render(false);
                        }
                    }
                    dragIdx = null;
                });

                list.appendChild(li);
            });
            updateCounter();
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function clearDragStyles() {
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function addTask() {
            const text = input.value.trim();
            if (!text) return;
            tasks.push({ text, done: false });
            input.value = '';
            input.focus();
            save();
            render(true);
        }

        function toggle(i) {
            tasks[i].done = !tasks[i].done;
            save();
            render(false);
        }

        function remove(i) {
            const items = list.querySelectorAll('li:not(.empty)');
            if (items[i]) {
                items[i].classList.add('removing');
                setTimeout(() => {
                    tasks.splice(i, 1);
                    save();
                    render(false);
                }, 200);
            }
        }

        function clearCompleted() {
            tasks = tasks.filter(t => !t.done);
            save();
            render(false);
        }

        render(false);
    </script>
</body>
</html>
