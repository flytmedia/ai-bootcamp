<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #ffffff;
            color: #111;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 3rem 1rem;
            min-height: 100vh;
        }

        .app { width: 100%; max-width: 520px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.25rem;
        }

        h1 { font-size: 1.6rem; font-weight: 300; color: #000; letter-spacing: -0.02em; }
        .counter { color: #999; font-size: 0.8rem; }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.25rem;
        }

        .clear-btn {
            background: none; border: none; color: #bbb; font-size: 0.8rem;
            cursor: pointer; padding: 0.25rem 0; transition: color 0.2s;
            font-family: inherit;
        }
        .clear-btn:hover { color: #666; }
        .clear-btn:disabled { cursor: default; color: #e0e0e0; }

        .input-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.85rem 1rem;
            background: #f8f8f8;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            color: #111;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #aaa; }
        input[type="text"]::placeholder { color: #bbb; }

        .add-btn {
            padding: 0.85rem 1.5rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            min-width: 70px;
        }
        .add-btn:hover { background: #333; }
        .add-btn:active { transform: scale(0.97); }

        ul { list-style: none; }

        li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.9rem 0.5rem;
            border-bottom: 1px solid #f0f0f0;
            cursor: grab;
            transition: background 0.15s, opacity 0.3s, transform 0.3s;
            user-select: none;
            -webkit-user-select: none;
            min-height: 44px;
        }
        li:active { cursor: grabbing; }
        li:hover { background: #fafafa; border-radius: 10px; }
        li.dragging { opacity: 0.3; transform: scale(0.98); }
        li.drag-over { border-top: 2px solid #ccc; }

        li.adding { animation: slideIn 0.25s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        li.removing { animation: slideOut 0.2s ease-in forwards; }
        @keyframes slideOut {
            to { opacity: 0; transform: translateX(30px); height: 0; padding: 0; overflow: hidden; }
        }

        .check {
            width: 22px; height: 22px;
            border: 2px solid #ddd;
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            min-width: 22px;
            min-height: 22px;
        }
        .check:hover { border-color: #999; }
        .check.done { background: #000; border-color: #000; }
        .check.done::after { content: '✓'; color: #fff; font-size: 0.65rem; font-weight: 800; }

        .text {
            flex: 1;
            font-size: 1rem;
            line-height: 1.4;
            transition: all 0.2s;
            word-break: break-word;
        }
        .text.done { text-decoration: line-through; color: #bbb; }

        .del {
            color: #ddd;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 0.25rem 0.5rem;
            opacity: 0;
            transition: all 0.15s;
            border-radius: 6px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        li:hover .del { opacity: 1; }
        .del:hover { color: #e00; background: #fff0f0; }

        .empty {
            color: #ccc;
            text-align: center;
            padding: 3rem 1rem;
            font-size: 0.9rem;
            cursor: default;
        }

        @media (max-width: 480px) {
            body { padding: 2rem 0.75rem; }
            .add-btn { padding: 0.85rem 1rem; }
            li { padding: 1rem 0.5rem; }
            .del { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>To-Do</h1>
            <span class="counter" id="counter"></span>
        </div>
        <div class="actions">
            <button class="clear-btn" id="clear-done" onclick="clearCompleted()">Clear completed</button>
        </div>
        <div class="input-row">
            <input type="text" id="input" placeholder="What needs to be done?" autofocus>
            <button class="add-btn" onclick="addTask()">Add</button>
        </div>
        <ul id="list"></ul>
    </div>

    <script>
        const input = document.getElementById('input');
        const list = document.getElementById('list');
        let tasks = JSON.parse(localStorage.getItem('todos') || '[]');
        let dragIdx = null;

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') addTask();
            if (e.key === 'Escape') { input.value = ''; input.blur(); }
        });

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function save() {
            localStorage.setItem('todos', JSON.stringify(tasks));
            updateCounter();
        }

        function updateCounter() {
            const done = tasks.filter(t => t.done).length;
            const counter = document.getElementById('counter');
            const clearBtn = document.getElementById('clear-done');
            counter.textContent = tasks.length ? `${done} of ${tasks.length} completed` : '';
            clearBtn.disabled = done === 0;
        }

        function render(animateNew) {
            list.innerHTML = '';
            if (tasks.length === 0) {
                list.innerHTML = '<li class="empty">No tasks yet.</li>';
                updateCounter();
                return;
            }
            tasks.forEach((task, i) => {
                const li = document.createElement('li');
                li.draggable = true;
                li.dataset.index = i;
                if (animateNew && i === tasks.length - 1) li.classList.add('adding');

                li.innerHTML = `
                    <div class="check ${task.done ? 'done' : ''}" onclick="toggle(${i})"></div>
                    <span class="text ${task.done ? 'done' : ''}">${esc(task.text)}</span>
                    <span class="del" onclick="remove(${i})">×</span>
                `;

                li.addEventListener('dragstart', () => { dragIdx = i; li.classList.add('dragging'); });
                li.addEventListener('dragend', () => { dragIdx = null; li.classList.remove('dragging'); clearDragStyles(); });
                li.addEventListener('dragover', e => { e.preventDefault(); li.classList.add('drag-over'); });
                li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
                li.addEventListener('drop', e => {
                    e.preventDefault();
                    li.classList.remove('drag-over');
                    if (dragIdx !== null && dragIdx !== i) {
                        const moved = tasks.splice(dragIdx, 1)[0];
                        tasks.splice(i, 0, moved);
                        save(); render(false);
                    }
                });

                list.appendChild(li);
            });
            updateCounter();
        }

        function clearDragStyles() {
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function addTask() {
            const text = input.value.trim();
            if (!text) return;
            tasks.push({ text, done: false });
            input.value = '';
            input.focus();
            save(); render(true);
        }

        function toggle(i) { tasks[i].done = !tasks[i].done; save(); render(false); }

        function remove(i) {
            const items = list.querySelectorAll('li:not(.empty)');
            if (items[i]) {
                items[i].classList.add('removing');
                setTimeout(() => { tasks.splice(i, 1); save(); render(false); }, 200);
            }
        }

        function clearCompleted() { tasks = tasks.filter(t => !t.done); save(); render(false); }

        render(false);
    </script>
</body>
</html>
