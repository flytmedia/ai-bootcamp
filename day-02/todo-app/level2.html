<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #fff;
            color: #222;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 3rem 1rem;
        }
        .container { width: 100%; max-width: 500px; }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; font-weight: 400; }
        .input-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        input {
            flex: 1; padding: 0.75rem; background: #f5f5f5; border: 1px solid #ddd;
            border-radius: 6px; color: #222; font-size: 1rem; outline: none;
        }
        input:focus { border-color: #999; }
        button {
            padding: 0.75rem 1.25rem; background: #000; color: #fff; border: none;
            border-radius: 6px; font-weight: 600; cursor: pointer;
        }
        button:hover { background: #333; }
        ul { list-style: none; }
        li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 0.25rem; border-bottom: 1px solid #eee;
        }
        .delete { color: #ccc; cursor: pointer; font-size: 1.2rem; }
        .delete:hover { color: #e00; }
        .empty { color: #bbb; text-align: center; padding: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do</h1>
        <div class="input-row">
            <input type="text" id="task" placeholder="Add a task...">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="list">
            <li class="empty" id="empty">No tasks yet.</li>
        </ul>
    </div>
    <script>
        const input = document.getElementById('task');
        input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
        function addTask() {
            if (!input.value.trim()) return;
            const empty = document.getElementById('empty');
            if (empty) empty.remove();
            const li = document.createElement('li');
            li.innerHTML = `<span>${input.value.trim()}</span><span class="delete" onclick="this.parentElement.remove()">×</span>`;
            document.getElementById('list').appendChild(li);
            input.value = '';
        }
    </script>
</body>
</html>
